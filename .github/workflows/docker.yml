name: Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ secrets.GHCR_TOKEN != '' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/carloG1287/resturantes-admin
          tags: |
            type=raw,value=latest
            type=sha
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ secrets.GHCR_TOKEN != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL }}
            VITE_CLIENT_PUBLIC_URL=${{ vars.VITE_CLIENT_PUBLIC_URL }}
            VITE_APP_NAME=Resturantes
            VITE_ADMIN_PUBLIC_BASE_URL=${{ vars.VITE_ADMIN_PUBLIC_BASE_URL }}
            VITE_ADMIN_TEST_PUBLIC_BASE_URL=${{ vars.VITE_ADMIN_TEST_PUBLIC_BASE_URL }}
